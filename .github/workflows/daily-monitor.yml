name: BMW CarMax Daily Monitor

on:
  schedule:
    - cron: '0 19 * * *'   # 12:00pm PDT
    - cron: '0 3 * * *'    # 8:00pm PDT
  workflow_dispatch:

permissions:
  contents: write   # needed to commit seen_cars.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run CarMax monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python carmax_monitor.py
